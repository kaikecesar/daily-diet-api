permissions:
  contents: read

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Lint validation
        run: npm run lint
      - name: Test validation
        env:
          DATABASE_CLIENT: sqlite
          DATABASE_URL: ./database/test.db
        run: npm test
